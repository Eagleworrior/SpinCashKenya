<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin Cash Kenya - PRO</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    :root { 
      --gold: #FFD700; --hot-pink: #ff007f; --money-green: #00fc7b; 
      --cyan: #00ffff; --bg: #0a0a0a; --purple: #8a2be2;
    }
    
    body { 
      font-family: 'Arial Black', sans-serif; background: var(--bg); color: #fff; 
      margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh;
    }
    
    .app-container { width: 100%; max-width: 450px; }
    
    .panel { 
      background: #1a1a1a; padding: 20px; border-radius: 20px; 
      border: 2px solid var(--gold); margin-bottom: 20px; 
      box-shadow: 0 0 15px rgba(255,215,0,0.2); 
    }
    
    .btn { 
      padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; 
      width: 100%; border: none; text-transform: uppercase; margin: 10px 0; 
      transition: 0.3s;
    }
    
    .btn:active { transform: scale(0.95); }
    
    .slot-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); 
      gap: 10px; margin-bottom: 20px;
    }
    
    .slot-cell { 
      padding: 20px; background: #333; border: 2px solid #555; 
      border-radius: 10px; text-align: center; font-size: 1.5em; 
    }
    
    #jackpotOverlay { 
      position: fixed; top:0; left:0; width:100%; height:100%; 
      background: rgba(255,215,0,0.95); z-index: 999; 
      display: flex; flex-direction: column; align-items: center; 
      justify-content: center; animation: flash 0.5s infinite; 
    }
    
    @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .hidden { display: none !important; }

    /* RESPONSIVE ADJUSTMENTS */
    @media (max-width: 400px) {
      .slot-cell { font-size: 1.2em; padding: 15px; }
      h1 { font-size: 1.5em; }
    }
  </style>
</head>
<body>

  <div id="jackpotOverlay" class="hidden">
    <h1 style="font-size: 3em; color: red;">JACKPOT!</h1>
    <h2 style="color: #000;">KSh 50,000 WON!</h2>
  </div>

  <div class="app-container">
    <div id="appPanel" class="panel">
      <h1 style="text-align:center;">SPIN CASH KE</h1>
      <div style="text-align:center; margin-bottom: 15px;">
        Balance: KSh <span id="bal" style="color:var(--gold);">500</span>
      </div>
      
      <div id="slotGrid" class="slot-grid">
        <div class="slot-cell">🍒</div><div class="slot-cell">💎</div><div class="slot-cell">7️⃣</div>
      </div>
      
      <button class="btn" style="background:var(--money-green);" onclick="spinSlots()">SPIN (20 KSh)</button>
      <button class="btn" style="background:var(--cyan);" onclick="payWithPaystack()">DEPOSIT KSh 100</button>
    </div>
  </div>

  <script>
    // --- TESTING KEYS ---
    const PUBLIC_KEY = 'pk_live_27d2699bf73e5b924f911ce6d2ba876a7657d1bd';
    const SECRET_KEY = 'sk_live_063bad45c1cba73030a4b8d3a670a4272b32f815';
    let balance = 500;

    // --- PAYSTACK LOGIC ---
    function payWithPaystack() {
        let handler = PaystackPop.setup({
            key: PUBLIC_KEY,
            email: 'tester@test.com',
            amount: 10000, // 100 KES
            currency: 'KES',
            callback: function(response) {
                // In testing, updating local balance after reference
                alert('Payment Success! Reference: ' + response.reference);
                balance += 100;
                updateUI();
            }
        });
        handler.openIframe();
    }

    // --- GAME LOGIC ---
    function spinSlots() {
      if(balance < 20) return alert("Low balance!");
      balance -= 20; 
      updateUI();
      
      const symbols = ["🍒", "💎", "7️⃣", "🔔", "🍊"];
      let cells = document.querySelectorAll('.slot-cell');
      cells.forEach(c => c.textContent = symbols[Math.floor(Math.random()*symbols.length)]);
      
      // Random Win Logic
      if(Math.random() < 0.2) { 
        balance += 100;
        alert("Win! +100 KSh");
      }
      
      // Jackpot Logic
      if(Math.random() < 0.05) { 
        document.getElementById('jackpotOverlay').classList.remove('hidden');
        setTimeout(() => { 
          document.getElementById('jackpotOverlay').classList.add('hidden'); 
          balance += 50000; 
          updateUI(); 
        }, 3000);
      }
      updateUI();
    }

    function updateUI() { 
      document.getElementById('bal').textContent = balance; 
    }
  </script>
</body>
</html>
