<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpinWin Kenya - Win Big!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    .title-font { font-family: 'Playfair Display', sans-serif; }
    .casino-glow { text-shadow: 0 0 20px rgb(234 179 8); }
    .wheel-container { filter: drop-shadow(0 0 30px rgb(234 179 8)); }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-950 via-black to-yellow-950 text-white min-h-screen">

<div class="max-w-6xl mx-auto">
  <!-- Header -->
  <div class="flex justify-between items-center p-4 border-b border-yellow-500/30">
    <h1 class="text-4xl title-font casino-glow text-yellow-400">SPINWIN KENYA</h1>
    <div class="flex items-center gap-4">
      <div onclick="toggleMode()" id="modeToggle" 
           class="px-4 py-2 rounded-full bg-gray-800 hover:bg-gray-700 cursor-pointer transition-all">
        <span id="modeText" class="font-bold">DEMO MODE</span>
      </div>
      <div class="text-right">
        <p class="text-sm text-gray-400">Balance</p>
        <p id="balanceDisplay" class="text-2xl font-bold text-yellow-400">KSh 500</p>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="flex border-b border-yellow-500/30 bg-black/50">
    <button onclick="showTab(0)" class="tab-btn active flex-1 py-4 font-medium">🎰 SPIN WHEEL</button>
    <button onclick="showTab(1)" class="tab-btn flex-1 py-4 font-medium">💰 DEPOSIT</button>
    <button onclick="showTab(2)" class="tab-btn flex-1 py-4 font-medium">💸 WITHDRAW</button>
    <button onclick="showTab(3)" class="tab-btn flex-1 py-4 font-medium">👥 REFERRALS</button>
    <button onclick="showTab(4)" class="tab-btn flex-1 py-4 font-medium">👤 PROFILE</button>
  </div>

  <!-- Tab Contents -->
  <div id="tab0" class="tab-content p-6">
    <div class="wheel-container mx-auto w-80 h-80 rounded-full border-8 border-yellow-400 overflow-hidden">
      <canvas id="wheel" width="320" height="320"></canvas>
    </div>
    <div class="text-center mt-8">
      <input type="number" id="betAmount" value="10" min="5" 
             class="bg-black/70 text-center text-2xl w-32 py-3 rounded-xl border border-yellow-400">
      <button onclick="spinWheel()" id="spinBtn"
              class="ml-4 bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-300 hover:to-orange-400 text-black font-bold text-2xl px-12 py-4 rounded-2xl transition-all">
        SPIN NOW
      </button>
    </div>
    <div id="result" class="text-3xl font-bold mt-6 min-h-12"></div>
  </div>

  <!-- Deposit Tab -->
  <div id="tab1" class="tab-content hidden p-6">
    <div class="max-w-md mx-auto bg-black/60 rounded-3xl p-8">
      <h2 class="text-3xl font-bold mb-6 text-yellow-400">Deposit Money</h2>
      <input type="number" id="depositAmt" value="50" min="50" step="50" 
             class="w-full bg-black/80 border border-yellow-400 rounded-2xl p-6 text-3xl text-center mb-6">
      <button onclick="deposit()" 
              class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-6 text-2xl rounded-2xl">
        DEPOSIT KSh
      </button>
      <p class="text-center text-gray-400 mt-4">Minimum Deposit: KSh 50</p>
    </div>
  </div>

  <!-- Withdraw Tab -->
  <div id="tab2" class="tab-content hidden p-6">
    <div class="max-w-md mx-auto bg-black/60 rounded-3xl p-8 text-center">
      <h2 class="text-3xl font-bold mb-6 text-yellow-400">Withdraw</h2>
      <div id="withdrawStatus" class="mb-6"></div>
      <input type="number" id="withdrawAmt" placeholder="Amount" min="2500"
             class="w-full bg-black/80 border border-yellow-400 rounded-2xl p-6 text-3xl text-center mb-6">
      <button onclick="withdraw()" 
              class="w-full bg-gradient-to-r from-red-500 to-pink-500 hover:from-red-600 hover:to-pink-600 font-bold py-6 text-2xl rounded-2xl">
        REQUEST WITHDRAWAL
      </button>
      <p class="text-xs text-gray-400 mt-4">Minimum Withdrawal: KSh 2,500</p>
    </div>
  </div>

  <!-- Referrals Tab -->
  <div id="tab3" class="tab-content hidden p-6">
    <div class="max-w-md mx-auto bg-black/60 rounded-3xl p-8">
      <h2 class="text-3xl font-bold mb-6">Refer & Earn</h2>
      <p class="text-gray-300 mb-4">Share your link and earn 10% of your referrals' first deposit!</p>
      <div class="flex gap-2">
        <input id="refLink" value="https://spinwin.co.ke/ref/USERK12345" readonly
               class="flex-1 bg-black/80 border border-yellow-400 rounded-2xl p-4 text-sm">
        <button onclick="copyRefLink()" 
                class="bg-yellow-400 text-black px-8 rounded-2xl font-bold">COPY</button>
      </div>
      <p class="text-center text-sm text-gray-400 mt-8">Your Referrals: <span id="refCount" class="text-yellow-400 font-bold">0</span></p>
    </div>
  </div>

  <!-- Profile Tab -->
  <div id="tab4" class="tab-content hidden p-6">
    <div class="max-w-md mx-auto bg-black/60 rounded-3xl p-8 space-y-6">
      <h2 class="text-3xl font-bold text-yellow-400">My Profile</h2>
      
      <div>
        <label class="block text-sm mb-1">Full Name</label>
        <input id="name" value="John Doe" class="w-full bg-black/80 border border-yellow-400 rounded-xl p-4">
      </div>
      <div>
        <label class="block text-sm mb-1">Email</label>
        <input id="email" value="john@example.com" type="email" class="w-full bg-black/80 border border-yellow-400 rounded-xl p-4">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm mb-1">Country</label>
          <input id="country" value="Kenya" class="w-full bg-black/80 border border-yellow-400 rounded-xl p-4">
        </div>
        <div>
          <label class="block text-sm mb-1">Region</label>
          <input id="region" value="Nairobi" class="w-full bg-black/80 border border-yellow-400 rounded-xl p-4">
        </div>
      </div>

      <div>
        <label class="block text-sm mb-2">Upload ID / Driving License (Verification)</label>
        <input type="file" id="idUpload" accept="image/*" class="block w-full">
        <button onclick="uploadDocument()" 
                class="mt-3 bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl">
          Upload Document
        </button>
      </div>

      <div id="verificationStatus" class="p-4 rounded-2xl text-center font-bold"></div>
    </div>
  </div>
</div>

<script>
// ============== STATE ==============
let balance = 500;
let isDemoMode = true;
let isVerified = false;
let spinHistory = [];

// Wheel setup
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const segments = [
  {label: "×0", color: "#ef4444", mult: 0},
  {label: "×2", color: "#22c55e", mult: 2},
  {label: "×0", color: "#ef4444", mult: 0},
  {label: "×5", color: "#eab308", mult: 5},
  {label: "×1", color: "#3b82f6", mult: 1},
  {label: "×10", color: "#a855f7", mult: 10},
  {label: "×0", color: "#ef4444", mult: 0},
  {label: "×3", color: "#f97316", mult: 3}
];

let currentBet = 10;
let isSpinning = false;

// ============== TABS ==============
function showTab(n) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById('tab' + n).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === n);
  });
}

// ============== MODE ==============
function toggleMode() {
  isDemoMode = !isDemoMode;
  document.getElementById('modeText').textContent = isDemoMode ? "DEMO MODE" : "REAL MODE";
  resetBalance();
}

function resetBalance() {
  balance = isDemoMode ? 500 : 200;
  updateBalance();
}

// ============== WHEEL ==============
function drawWheel(rotation = 0) {
  const radius = 150;
  const centerX = 160, centerY = 160;
  const arc = Math.PI * 2 / segments.length;

  ctx.clearRect(0, 0, 320, 320);

  segments.forEach((seg, i) => {
    const angle = rotation + i * arc;
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, angle, angle + arc);
    ctx.lineTo(centerX, centerY);
    ctx.fillStyle = seg.color;
    ctx.fill();
    ctx.strokeStyle = "#111";
    ctx.lineWidth = 6;
    ctx.stroke();

    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(angle + arc / 2);
    ctx.fillStyle = "white";
    ctx.font = "bold 22px Poppins";
    ctx.textAlign = "center";
    ctx.fillText(seg.label, radius * 0.65, 8);
    ctx.restore();
  });

  // Arrow
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.moveTo(160, 20);
  ctx.lineTo(140, 60);
  ctx.lineTo(180, 60);
  ctx.fill();
}

function spinWheel() {
  if (isSpinning || balance < currentBet) {
    alert("Not enough balance!");
    return;
  }

  balance -= currentBet;
  updateBalance();
  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;

  let duration = 4500;
  let startTime = Date.now();
  let startRotation = Math.random() * Math.PI * 2;

  // Smart win/loss logic (harder on real mode)
  let winChance = isDemoMode ? 0.65 : 0.38;

  function animate() {
    let elapsed = Date.now() - startTime;
    let progress = Math.min(elapsed / duration, 1);
    let ease = 1 - Math.pow(1 - progress, 5);

    let rotation = startRotation + (ease * 12 * Math.PI);

    drawWheel(rotation);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      // Determine result
      const finalIndex = Math.floor(Math.random() * segments.length);
      const result = segments[finalIndex];
      const winnings = Math.floor(currentBet * result.mult);

      // Bias: occasional big wins but overall drain
      const finalWinnings = (Math.random() < winChance) ? winnings : 0;

      balance += finalWinnings;
      updateBalance();

      const resEl = document.getElementById('result');
      if (finalWinnings > 0) {
        resEl.innerHTML = `🎉 WIN! +KSh ${finalWinnings}`;
        resEl.className = "text-green-400";
      } else {
        resEl.innerHTML = `💸 Lost KSh ${currentBet}`;
        resEl.className = "text-red-400";
      }

      isSpinning = false;
      document.getElementById('spinBtn').disabled = false;
    }
  }

  animate();
}

// ============== OTHER FUNCTIONS ==============
function updateBalance() {
  document.getElementById('balanceDisplay').textContent = `KSh ${balance}`;
}

function deposit() {
  const amt = parseInt(document.getElementById('depositAmt').value);
  if (amt >= 50) {
    balance += amt;
    updateBalance();
    alert(`✅ Deposited KSh ${amt}`);
  }
}

function withdraw() {
  if (!isVerified) {
    alert("❌ You must complete profile verification first!");
    showTab(4);
    return;
  }
  const amt = parseInt(document.getElementById('withdrawAmt').value);
  if (amt < 2500) {
    alert("Minimum withdrawal is KSh 2,500");
    return;
  }
  if (amt > balance) {
    alert("Insufficient balance");
    return;
  }
  balance -= amt;
  updateBalance();
  alert(`✅ Withdrawal of KSh ${amt} requested! (Processed within 24hrs)`);
}

function uploadDocument() {
  if (document.getElementById('idUpload').files.length > 0) {
    isVerified = true;
    document.getElementById('verificationStatus').innerHTML = 
      `<span class="text-green-400">✅ Verified - You can now withdraw</span>`;
    alert("Document uploaded successfully! Account verified.");
  }
}

function copyRefLink() {
  const link = document.getElementById('refLink');
  link.select();
  document.execCommand('copy');
  alert("Referral link copied!");
}

// Initialize
drawWheel();
updateBalance();
showTab(0);
document.getElementById('verificationStatus').innerHTML = 
  `<span class="text-red-400">⚠️ Not Verified - Upload ID to withdraw</span>`;
</script>

</body>
</html>
