<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin Cash Kenya</title>
  <style>
    /* BRAND COLORS: SPIN CASH KENYA */
    :root {
      --money-green: #00B365;
      --gold: #FFD700;
      --dark-charcoal: #121212;
      --panel-bg: #1e1e1e;
      --text-light: #f5f5f5;
      --danger: #ff4444;
    }

    body {
      font-family: 'Roboto', 'Arial', sans-serif;
      background-color: var(--dark-charcoal);
      color: var(--text-light);
      text-align: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .hidden { display: none !important; }

    /* TYPOGRAPHY */
    h1, h2, h3 { font-family: 'Arial Black', Impact, sans-serif; text-transform: uppercase; margin-bottom: 10px; }
    h1 { color: var(--gold); font-size: 2.2em; letter-spacing: 1px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    h2 { color: var(--text-light); font-size: 1.5em; }
    
    /* AUTHENTICATION PANEL */
    .auth-container {
      max-width: 400px;
      margin: 60px auto;
      background: var(--panel-bg);
      padding: 30px;
      border-radius: 12px;
      border-top: 5px solid var(--money-green);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    }
    .form-group { margin-bottom: 15px; text-align: left; }
    label { color: #aaa; font-size: 0.9em; font-weight: bold; display: block; margin-bottom: 5px; }
    input {
      width: 100%; padding: 12px; box-sizing: border-box; background: #2a2a2a;
      border: 1px solid #444; border-radius: 6px; color: white;
      font-size: 1.1em;
    }
    input:focus { outline: none; border-color: var(--money-green); }

    .btn {
      width: 100%; padding: 14px; color: #000; border: none; border-radius: 6px; 
      font-size: 1.2em; font-weight: bold; cursor: pointer; text-transform: uppercase; 
      transition: transform 0.1s, filter 0.2s; margin-top: 10px;
    }
    .btn:active { transform: scale(0.98); }
    .btn:hover { filter: brightness(1.1); }
    
    .btn-demo { background: var(--gold); }
    .btn-real { background: var(--money-green); color: white; }
    .btn-action { background: linear-gradient(to right, #00B365, #009955); color: white; box-shadow: 0 4px 15px rgba(0, 179, 101, 0.4); }

    /* MAIN DASHBOARD */
    .app-header {
      background: #000; padding: 15px 20px; display: flex;
      justify-content: space-between; align-items: center; border-bottom: 3px solid var(--gold);
    }
    .header-logo { margin: 0; font-size: 1.5em; color: var(--money-green); }
    .header-logo span { color: var(--gold); }
    
    .balance-badge {
      font-size: 1.3em; color: var(--gold); font-weight: bold;
      border: 1px solid var(--gold); padding: 8px 15px; border-radius: 20px; background: rgba(255, 215, 0, 0.1);
    }
    .mode-badge { font-size: 0.9em; padding: 4px 10px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
    .mode-demo { background: var(--gold); color: #000; }
    .mode-real { background: var(--money-green); color: #fff; }

    .game-tabs { margin: 20px auto; display: flex; justify-content: center; gap: 10px; padding: 0 10px; }
    .tab-btn {
      padding: 12px 20px; background: #333; color: #fff; border: none;
      font-size: 1em; font-weight: bold; border-radius: 8px; cursor: pointer; flex: 1; max-width: 200px;
    }
    .tab-btn.active { background: var(--money-green); color: #fff; }

    .panel {
      background: var(--panel-bg); padding: 25px; border-radius: 12px;
      margin: 15px auto; max-width: 800px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    /* M-PESA UI */
    .mpesa-box { border-left: 5px solid var(--money-green); text-align: center; }
    .mpesa-box input { width: 120px; display: inline-block; text-align: center; margin-right: 10px; }
    .mpesa-box .btn { width: auto; padding: 12px 25px; display: inline-block; margin: 0; }

    /* WHEEL UI */
    .wheel-outer { position: relative; width: 340px; height: 340px; margin: 30px auto; }
    .wheel-pointer {
      position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent;
      border-top: 35px solid var(--gold); z-index: 10; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
    }
    #wheelCanvas { width: 340px; height: 340px; border-radius: 50%; border: 6px solid #333; box-shadow: 0 0 25px rgba(0, 0, 0, 0.8); }

    /* 5x4 SLOT MACHINE UI */
    .slot-machine-box {
      background: #0a0a0a; border: 4px solid #333; border-radius: 12px;
      padding: 15px; margin: 20px auto;
    }
    .slot-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(4, 1fr);
      gap: 8px; background: #111; padding: 10px; border-radius: 8px;
    }
    .slot-cell {
      background: #222; border: 1px solid #444; border-radius: 6px;
      font-size: 2.5em; display: flex; align-items: center; justify-content: center;
      height: 70px; transition: all 0.2s;
    }
    .win-cell {
      background: var(--money-green); border-color: var(--gold); box-shadow: 0 0 15px var(--money-green);
      transform: scale(1.05); z-index: 2;
    }

    .bet-control { margin: 20px 0; }
    .bet-control input { width: 120px; text-align: center; font-size: 1.2em; display: inline-block; }

    #gameOutput { font-size: 1.5em; font-weight: bold; margin: 20px; min-height: 40px; }
    .text-win { color: var(--money-green); text-shadow: 0 0 10px rgba(0, 179, 101, 0.5); }
    .text-lose { color: var(--danger); }
  </style>
</head>
<body>

  <!-- AUTH / MODE SELECTION PANEL -->
  <div id="authPanel" class="auth-container">
    <h1 style="color:var(--money-green);">SPIN CASH <span style="color:var(--gold);">KENYA</span></h1>
    <p style="color:#aaa; margin-top:-10px; margin-bottom:25px;">Real-Time Spin & Bet Platform</p>
    
    <div id="registerForm">
      <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="Your Name"></div>
      <div class="form-group"><label>M-Pesa Number</label><input type="text" id="regPhone" placeholder="0712345678"></div>
      <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="••••••••"></div>
      
      <div style="margin-top: 25px;">
        <button class="btn btn-demo" onclick="handleAuth('demo')">🎮 Play Demo (KSh 500)</button>
        <button class="btn btn-real" onclick="handleAuth('real')">💰 Play Real (Deposit)</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP PANEL -->
  <div id="appPanel" class="hidden">
    <header class="app-header">
      <h1 class="header-logo">SPIN CASH <span>KE</span></h1>
      <div style="display: flex; gap: 15px; align-items: center;">
        <span id="displayMode" class="mode-badge mode-demo">DEMO</span>
        <div class="balance-badge">KSh <span id="accountBalance">0</span></div>
        <button onclick="location.reload()" style="background:transparent; border:none; color:#aaa; font-weight:bold; cursor:pointer;">EXIT</button>
      </div>
    </header>

    <div class="game-tabs">
      <button class="tab-btn active" id="tabWheel" onclick="switchGame('wheel')">WHEEL</button>
      <button class="tab-btn" id="tabSlots" onclick="switchGame('slots')">FRUIT SLOTS</button>
    </div>

    <!-- M-PESA SIMULATOR -->
    <div id="mpesaSection" class="panel mpesa-box hidden">
      <h3 style="color: var(--money-green); margin-top:0;">M-PESA DEPOSIT</h3>
      <div style="display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:10px;">
        <input type="number" id="depositAmount" value="250" min="50">
        <button class="btn btn-action" onclick="triggerMpesa()">SEND TO M-PESA</button>
      </div>
      <p id="depositStatus" style="color:var(--gold); font-weight:bold; margin-top:10px;"></p>
    </div>

    <!-- GAME 1: HIGH SPEED WHEEL -->
    <div id="gameWheelSection" class="panel">
      <h2>CASH WHEEL MULTIPLIER</h2>
      <div class="wheel-outer">
        <div class="wheel-pointer"></div>
        <canvas id="wheelCanvas" width="340" height="340"></canvas>
      </div>
      <div class="bet-control">
        <label>BET AMOUNT (KSh)</label><br>
        <input type="number" id="wheelBet" value="20" min="5">
      </div>
      <button class="btn btn-action" id="wheelSpinBtn" style="max-width:300px;" onclick="spinWheel()">SPIN WHEEL</button>
    </div>

    <!-- GAME 2: 5x4 SLOTS -->
    <div id="gameSlotsSection" class="panel hidden">
      <h2>5x4 MEGA FRUITS</h2>
      <p style="color: #aaa; font-size: 0.9em;">Match 3+ symbols horizontally from left to right to win.</p>
      
      <div class="slot-machine-box">
        <div class="slot-grid" id="slotGrid">
          <!-- 20 Cells generated by JS -->
        </div>
      </div>
      <div class="bet-control">
        <label>BET AMOUNT (KSh)</label><br>
        <input type="number" id="slotBet" value="50" min="5">
      </div>
      <button class="btn btn-action" id="slotSpinBtn" style="max-width:300px;" onclick="spinSlots()">SPIN SLOTS</button>
    </div>

    <div id="gameOutput"></div>
  </div>

  <script>
    // --- STATE ENGINE ---
    let balance = 0;
    let playMode = 'demo'; 
    let isSpinning = false;

    // --- AUDIO ENGINE ---
    const AudioEngine = {
      ctx: null,
      init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
      playTone(f, type, dur) {
        this.init(); try {
          let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
          osc.type = type; osc.frequency.setValueAtTime(f, this.ctx.currentTime);
          gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur);
          osc.connect(gain); gain.connect(this.ctx.destination);
          osc.start(); osc.stop(this.ctx.currentTime + dur);
        } catch(e) {}
      },
      tick() { this.playTone(600, 'sine', 0.05); },
      win() { this.playTone(880, 'triangle', 0.1); setTimeout(()=>this.playTone(1100, 'triangle', 0.15), 100); },
      lose() { this.playTone(150, 'sawtooth', 0.4); }
    };

    // --- AUTHENTICATION & MODE SETUP ---
    function handleAuth(mode) {
      playMode = mode;
      document.getElementById('authPanel').classList.add('hidden');
      document.getElementById('appPanel').classList.remove('hidden');
      
      const modeBadge = document.getElementById('displayMode');
      if(mode === 'demo') {
        balance = 500;
        modeBadge.textContent = "DEMO";
        modeBadge.className = "mode-badge mode-demo";
      } else {
        balance = 0;
        modeBadge.textContent = "REAL";
        modeBadge.className = "mode-badge mode-real";
        document.getElementById('mpesaSection').classList.remove('hidden');
      }
      updateBalanceUI();
    }

    function updateBalanceUI() { document.getElementById('accountBalance').textContent = balance; }

    function switchGame(target) {
      document.getElementById('tabWheel').classList.toggle('active', target === 'wheel');
      document.getElementById('tabSlots').classList.toggle('active', target === 'slots');
      document.getElementById('gameWheelSection').classList.toggle('hidden', target !== 'wheel');
      document.getElementById('gameSlotsSection').classList.toggle('hidden', target !== 'slots');
      document.getElementById('gameOutput').textContent = "";
    }

    // --- M-PESA LOGIC ---
    function triggerMpesa() {
      const amt = parseInt(document.getElementById('depositAmount').value);
      if(amt < 50) return alert("Minimum deposit is KSh 50");
      const status = document.getElementById('depositStatus');
      status.textContent = "Waiting for M-Pesa PIN confirmation...";
      setTimeout(() => {
        balance += amt; updateBalanceUI(); AudioEngine.win();
        status.style.color = "var(--money-green)";
        status.textContent = `Deposit of KSh ${amt} successful!`;
      }, 2500);
    }

    // --- WHEEL ENGINE ---
    const wheelSegments = [
      { label: "×0", color: "#ff4444", mult: 0 }, { label: "×2", color: "#00B365", mult: 2 },
      { label: "×0", color: "#ff4444", mult: 0 }, { label: "×5", color: "#FFD700", mult: 5 },
      { label: "×1", color: "#2196F3", mult: 1 }, { label: "×10", color: "#9C27B0", mult: 10 },
      { label: "×0", color: "#ff4444", mult: 0 }, { label: "×3", color: "#00B365", mult: 3 },
      { label: "×0", color: "#ff4444", mult: 0 }, { label: "×4", color: "#2196F3", mult: 4 },
      { label: "×0", color: "#ff4444", mult: 0 }, { label: "×15", color: "#FFD700", mult: 15 }
    ];
    const canvas = document.getElementById('wheelCanvas'); const ctx = canvas.getContext('2d');
    
    function drawWheel(angle = 0) {
      const radius = 170; const arc = (Math.PI * 2) / wheelSegments.length;
      ctx.clearRect(0,0,340,340);
      for(let i=0; i<wheelSegments.length; i++) {
        let a = angle + i * arc;
        ctx.beginPath(); ctx.moveTo(radius, radius); ctx.arc(radius, radius, radius, a, a+arc);
        ctx.fillStyle = wheelSegments[i].color; ctx.fill(); 
        ctx.strokeStyle = "#111"; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.save(); ctx.translate(radius, radius); ctx.rotate(a + arc/2);
        ctx.textAlign = "right"; ctx.fillStyle = "#fff"; ctx.font = "bold 18px Arial";
        ctx.fillText(wheelSegments[i].label, radius - 15, 6); ctx.restore();
      }
    }
    drawWheel();

    function spinWheel() {
      if(isSpinning) return;
      let bet = parseInt(document.getElementById('wheelBet').value);
      if(balance < bet) return alert("Insufficient balance! Please deposit.");
      balance -= bet; updateBalanceUI(); isSpinning = true;
      document.getElementById('gameOutput').textContent = "";
      
      let targetIdx = Math.floor(Math.random() * wheelSegments.length);
      const arc = (Math.PI*2)/wheelSegments.length;
      // Calculate angle so target stops under the top downward arrow
      let targetAngle = (Math.PI*1.5) - (targetIdx*arc) - (arc/2) + (Math.PI*2 * 12); 
      
      let start = Date.now();
      function anim() {
        let p = Math.min((Date.now()-start)/3500, 1);
        let ease = 1 - Math.pow(1-p, 5); // Fast start, smooth slow down
        drawWheel(targetAngle * ease);
        if(p < 1) { requestAnimationFrame(anim); if(Math.random()<0.3) AudioEngine.tick(); }
        else {
          let winMult = wheelSegments[targetIdx].mult; let won = bet * winMult; balance += won; updateBalanceUI();
          let out = document.getElementById('gameOutput');
          if(won > 0) { out.className = "text-win"; out.textContent = `WIN! KSh ${won}`; AudioEngine.win(); }
          else { out.className = "text-lose"; out.textContent = `LOST KSh ${bet}`; AudioEngine.lose(); }
          isSpinning = false;
        }
      }
      anim();
    }

    // --- 5x4 SLOT MACHINE ENGINE ---
    const fruits = ["🍒","🍎","🍇","🍋","🍉","🍊","🍓","🍍","🍌","🥝","💎","🔔"];
    const gridEl = document.getElementById('slotGrid');
    let cells = [];

    // Initialize 20 empty cells
    for(let r=0; r<4; r++) {
      for(let c=0; c<5; c++) {
        let div = document.createElement('div');
        div.className = 'slot-cell'; div.textContent = fruits[Math.floor(Math.random()*fruits.length)];
        gridEl.appendChild(div); cells.push(div);
      }
    }

    function spinSlots() {
      if(isSpinning) return;
      let bet = parseInt(document.getElementById('slotBet').value);
      if(balance < bet) return alert("Insufficient balance! Please deposit.");
      balance -= bet; updateBalanceUI(); isSpinning = true;
      
      let out = document.getElementById('gameOutput');
      out.textContent = ""; cells.forEach(c => c.classList.remove('win-cell'));

      let spins = 0;
      let interval = setInterval(() => {
        cells.forEach(c => c.textContent = fruits[Math.floor(Math.random()*fruits.length)]);
        AudioEngine.tick(); spins++;
        if(spins > 25) {
          clearInterval(interval); evaluateSlots(bet, out);
        }
      }, 50);
    }

    function evaluateSlots(bet, out) {
      let grid = []; let cellIdx = 0;
      // Read final grid into 2D array
      for(let r=0; r<4; r++) {
        let row = [];
        for(let c=0; c<5; c++) { row.push({ icon: cells[cellIdx].textContent, dom: cells[cellIdx] }); cellIdx++; }
        grid.push(row);
      }

      let totalWon = 0;
      
      // Evaluate Horizontal Paylines (Rows 0 to 3)
      for(let r=0; r<4; r++) {
        let row = grid[r];
        if(row[0].icon === row[1].icon && row[1].icon === row[2].icon) {
          row[0].dom.classList.add('win-cell'); row[1].dom.classList.add('win-cell'); row[2].dom.classList.add('win-cell');
          let mult = 2; // 3 of a kind multiplier
          if(row[2].icon === row[3].icon) { mult = 5; row[3].dom.classList.add('win-cell'); } // 4 of a kind
          if(mult === 5 && row[3].icon === row[4].icon) { mult = 15; row[4].dom.classList.add('win-cell'); } // 5 of a kind
          
          if(row[0].icon === '💎') mult *= 5; // Diamond jackpot multiplier
          totalWon += (bet * mult);
        }
      }

      balance += totalWon; updateBalanceUI();
      if(totalWon > 0) {
        out.className = "text-win"; out.textContent = `SLOTS WIN! KSh ${totalWon}`; AudioEngine.win();
      } else {
        out.className = "text-lose"; out.textContent = `NO MATCH. SPIN AGAIN.`; AudioEngine.lose();
      }
      isSpinning = false;
    }
  </script>
</body>
</html>
