<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin Cash Kenya - VIP FULL</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    :root {
      --gold: #FFD700; --hot-pink: #ff007f; --money-green: #00fc7b;
      --cyan: #00ffff; --purple: #8a2be2; --dark-bg: #0a0a0a;
    }
    body { font-family: 'Arial Black', Impact, sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; }
    .app-container { max-width: 500px; margin: 0 auto; }
    .hidden { display: none !important; }

    /* DECORATED PANELS */
    .panel { padding: 20px; border-radius: 20px; margin: 15px 0; border: 3px solid #333; }
    .panel-gold { border-color: var(--gold); background: rgba(255, 215, 0, 0.05); }
    .panel-pink { border-color: var(--hot-pink); background: rgba(255, 0, 127, 0.05); }
    .panel-cyan { border-color: var(--cyan); background: rgba(0, 255, 255, 0.05); }
    .panel-purple { border-color: var(--purple); background: rgba(138, 43, 226, 0.05); }

    h1, h2 { text-transform: uppercase; text-shadow: 0 0 10px currentColor; }
    input { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #555; background: #111; color: #fff; box-sizing: border-box; margin: 10px 0; }
    
    .btn { padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin: 5px 0; transition: 0.3s; }
    .btn:active { transform: scale(0.95); }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-pink { background: var(--hot-pink); color: #fff; }
    .btn-cyan { background: var(--cyan); color: #000; }

    /* GAMES */
    .wheel-container { display: flex; flex-direction: column; align-items: center; }
    #wheelCanvas { width: 250px; height: 250px; border-radius: 50%; border: 5px solid var(--purple); }
    .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 20px 0; }
    .slot-cell { padding: 15px; background: #222; border: 1px solid #444; border-radius: 5px; text-align: center; }

    @media (max-width: 400px) { h1 { font-size: 1.5em; } }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="authPanel" class="panel panel-cyan">
      <h1 style="color:var(--cyan);">SPIN CASH KE</h1>
      <input type="text" id="regName" placeholder="ENTER NAME">
      <input type="text" id="regPhone" placeholder="07XX XXX XXX">
      <button class="btn btn-cyan" onclick="login()">ENTER CASINO</button>
    </div>

    <div id="appPanel" class="hidden">
      <div class="panel panel-gold" style="text-align: center;">
        <h2 style="color:var(--gold);">BALANCE: KSh <span id="bal">500</span></h2>
      </div>

      <div style="display:flex; gap:10px;">
        <button class="btn btn-purple" onclick="switchView('games')">GAMES</button>
        <button class="btn btn-pink" onclick="switchView('wallet')">WALLET</button>
        <button class="btn btn-cyan" onclick="switchView('profile')">PROFILE</button>
      </div>

      <div id="viewGames">
        <div class="panel panel-purple wheel-container">
          <h2 style="color:var(--purple);">SPIN WHEEL</h2>
          <canvas id="wheelCanvas"></canvas>
          <button class="btn btn-purple" onclick="spinWheel()">SPIN (20 KSh)</button>
        </div>
        <div class="panel panel-pink">
          <h2 style="color:var(--hot-pink);">SLOTS</h2>
          <div id="slotGrid" class="slot-grid"></div>
          <button class="btn btn-pink" onclick="spinSlots()">PULL LEVER (20 KSh)</button>
        </div>
      </div>

      <div id="viewWallet" class="panel panel-pink hidden">
        <h2 style="color:var(--hot-pink);">DEPOSIT & WITHDRAW</h2>
        <input type="number" id="depAmount" placeholder="Amount (KSh)">
        <button class="btn btn-pink" onclick="payWithPaystack()">DEPOSIT VIA M-PESA</button>
        <input type="number" id="withAmount" placeholder="Withdrawal Amount">
        <button class="btn btn-gold" onclick="alert('Withdrawal Request Sent!')">WITHDRAW</button>
      </div>

      <div id="viewProfile" class="panel panel-cyan hidden">
        <h2 style="color:var(--cyan);">PROFILE</h2>
        <p>Name: <span id="proName">Player</span></p>
        <p>Ref Link: https://spincash.ke/ref/07XX</p>
        <button class="btn btn-cyan" onclick="alert('Copied!')">COPY REF LINK</button>
        <button class="btn" style="background:#444;" onclick="location.reload()">LOGOUT</button>
      </div>
    </div>
  </div>

  <script>
    // --- TESTING KEYS ---
    const PUBLIC_KEY = 'pk_live_27d2699bf73e5b924f911ce6d2ba876a7657d1bd';
    const SECRET_KEY = 'sk_live_063bad45c1cba73030a4b8d3a670a4272b32f815';
    let balance = 500;

    // --- INIT SLOTS ---
    const grid = document.getElementById('slotGrid');
    for(let i=0; i<15; i++) {
        let div = document.createElement('div'); div.className = 'slot-cell';
        div.textContent = ["🍒","💎","7️⃣","🍋"][Math.floor(Math.random()*4)];
        grid.appendChild(div);
    }

    // --- NAVIGATION ---
    function login() {
        document.getElementById('proName').textContent = document.getElementById('regName').value || "Player";
        document.getElementById('authPanel').classList.add('hidden');
        document.getElementById('appPanel').classList.remove('hidden');
    }

    function switchView(view) {
        document.getElementById('viewGames').classList.toggle('hidden', view !== 'games');
        document.getElementById('viewWallet').classList.toggle('hidden', view !== 'wallet');
        document.getElementById('viewProfile').classList.toggle('hidden', view !== 'profile');
    }

    function updateUI() { document.getElementById('bal').textContent = balance; }

    // --- GAME LOGIC ---
    function spinWheel() {
        if(balance < 20) return alert("Low balance!");
        balance -= 20; updateUI();
        alert("Wheel spinning...");
    }

    function spinSlots() {
        if(balance < 20) return alert("Low balance!");
        balance -= 20; updateUI();
        let cells = document.querySelectorAll('.slot-cell');
        cells.forEach(c => c.textContent = ["🍒","💎","7️⃣","🍋"][Math.floor(Math.random()*4)]);
        if(Math.random() > 0.8) { balance += 100; alert("Win! +100 KSh"); }
        updateUI();
    }

    // --- PAYSTACK ---
    function payWithPaystack() {
        let amt = parseInt(document.getElementById('depAmount').value);
        let handler = PaystackPop.setup({
            key: PUBLIC_KEY,
            email: 'test@tester.com',
            amount: amt * 100,
            currency: 'KES',
            callback: (res) => { balance += amt; updateUI(); alert("Deposit OK!"); }
        });
        handler.openIframe();
    }
  </script>
</body>
</html>
