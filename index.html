<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin Cash Kenya - FULL VIP EDITION</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    :root {
      --money-green: #00fc7b; --gold: #FFD700; --hot-pink: #ff007f;
      --cyan: #00ffff; --purple: #8a2be2; --dark-bg: #0a0a0a;
    }
    body { font-family: 'Arial Black', Impact, sans-serif; background: radial-gradient(circle at center, #1a0033 0%, #000000 100%); color: #fff; text-align: center; margin: 0; padding: 0; }
    .hidden { display: none !important; }
    
    h1 { background: linear-gradient(90deg, var(--gold), var(--hot-pink), var(--cyan)); -webkit-background-clip: text; color: transparent; font-size: 2.5em; margin: 10px 0; }
    
    /* INPUTS & BUTTONS */
    input { width: 90%; padding: 12px; border: 3px dashed var(--purple); border-radius: 10px; background: rgba(0,0,0,0.8); color: var(--cyan); font-weight: bold; margin: 5px; }
    .btn { width: 90%; padding: 15px; margin: 10px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    .btn-login { background: linear-gradient(45deg, var(--purple), var(--hot-pink)); color: #fff; }
    .btn-action { background: linear-gradient(45deg, #008000, var(--money-green)); color: #fff; }

    /* PANELS */
    .panel { background: rgba(20,20,20,0.95); padding: 20px; border-radius: 20px; border: 2px solid var(--gold); margin: 15px auto; max-width: 450px; }
    .auth-container { border-color: var(--cyan); box-shadow: 0 0 40px rgba(0, 255, 255, 0.4); }
    
    /* GAMES */
    .wheel-container { border: 5px dotted var(--cyan); padding: 20px; border-radius: 20px; }
    #wheelCanvas { width: 280px; height: 280px; border: 5px solid var(--purple); border-radius: 50%; }
    .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #000; padding: 10px; border: 2px solid var(--gold); }
    .slot-cell { background: #333; padding: 10px; font-size: 1.5em; border: 1px solid #555; }
    .win-cell { border: 2px solid var(--gold); background: #440; }
  </style>
</head>
<body>

  <div id="authPanel" class="panel auth-container">
    <h1>SPIN CASH KE</h1>
    <input type="text" id="regName" placeholder="ENTER NAME">
    <input type="text" id="regPhone" placeholder="07XX XXX XXX">
    <input type="password" id="regPass" placeholder="PASSWORD">
    <button class="btn btn-login" onclick="login()">ENTER CASINO 🚀</button>
  </div>

  <div id="appPanel" class="hidden">
    <header style="padding: 15px; border-bottom: 2px solid var(--money-green);">
      <div style="font-size: 1.5em; color: var(--gold);">BALANCE: KSh <span id="accountBalance">500</span></div>
    </header>

    <div style="display:flex; justify-content:center; gap:5px; margin: 10px;">
      <button class="btn" onclick="switchView('games')">🎮 GAMES</button>
      <button class="btn" onclick="switchView('wallet')">💳 WALLET</button>
      <button class="btn" onclick="switchView('profile')">👤 PROFILE</button>
    </div>

    <div id="viewGames" class="panel">
      <div class="wheel-container">
        <h2>✨ NEON WHEEL ✨</h2>
        <canvas id="wheelCanvas"></canvas>
        <button class="btn btn-action" onclick="spinWheel()">SPIN WHEEL</button>
      </div>
      <div id="slotGrid" class="slot-grid" style="margin-top:20px;">
        </div>
      <button class="btn btn-action" onclick="spinSlots()">PULL LEVER</button>
    </div>

    <div id="viewWallet" class="panel hidden">
      <h2>💳 WALLET</h2>
      <input type="number" id="depAmount" placeholder="Amount to Deposit">
      <button class="btn btn-action" onclick="payWithPaystack()">DEPOSIT</button>
      <input type="number" id="withAmount" placeholder="Amount to Withdraw">
      <button class="btn btn-login" onclick="processWithdraw()">WITHDRAW</button>
    </div>

    <div id="viewProfile" class="panel hidden">
      <h2>👤 PROFILE</h2>
      <p>NAME: <span id="proName">Player</span></p>
      <p>REF LINK: <br><small>https://spincash.ke/ref/07XX</small></p>
      <button class="btn" onclick="alert('Link Copied!')">COPY LINK</button>
      <button class="btn" style="background:#555;" onclick="location.reload()">LOGOUT</button>
    </div>
  </div>

  <script>
    // --- KEYS ---
    const PUBLIC_KEY = 'pk_live_27d2699bf73e5b924f911ce6d2ba876a7657d1bd';
    let balance = 500;

    // --- INIT SLOTS ---
    const grid = document.getElementById('slotGrid');
    for(let i=0; i<20; i++) {
        let div = document.createElement('div'); div.className = 'slot-cell';
        div.textContent = ["🍒","💎","7️⃣","🍋"][Math.floor(Math.random()*4)];
        grid.appendChild(div);
    }

    // --- NAVIGATION ---
    function login() {
        document.getElementById('proName').textContent = document.getElementById('regName').value || "Player";
        document.getElementById('authPanel').classList.add('hidden');
        document.getElementById('appPanel').classList.remove('hidden');
    }

    function switchView(view) {
        document.getElementById('viewGames').classList.toggle('hidden', view !== 'games');
        document.getElementById('viewWallet').classList.toggle('hidden', view !== 'wallet');
        document.getElementById('viewProfile').classList.toggle('hidden', view !== 'profile');
    }

    // --- GAME LOGIC ---
    function spinWheel() {
        if(balance < 20) return alert("Low balance!");
        balance -= 20; updateUI();
        alert("Wheel Spinning...");
    }

    function spinSlots() {
        if(balance < 20) return alert("Low balance!");
        balance -= 20; updateUI();
        let cells = document.querySelectorAll('.slot-cell');
        cells.forEach(c => {
            c.textContent = ["🍒","💎","7️⃣","🍋"][Math.floor(Math.random()*4)];
            c.classList.remove('win-cell');
        });
        if(Math.random() > 0.8) { balance += 100; alert("Win! +100 KSh"); }
        updateUI();
    }

    // --- WALLET ---
    function payWithPaystack() {
        let amount = parseInt(document.getElementById('depAmount').value);
        if(!amount) return alert("Enter amount!");
        let handler = PaystackPop.setup({
            key: PUBLIC_KEY,
            email: 'player@spincash.com',
            amount: amount * 100,
            currency: 'KES',
            callback: (res) => { balance += amount; updateUI(); alert("Deposit Successful!"); }
        });
        handler.openIframe();
    }

    function processWithdraw() {
        let amt = parseInt(document.getElementById('withAmount').value);
        if(balance < amt) return alert("Insufficient funds!");
        balance -= amt; updateUI();
        alert("Withdrawal requested: KSh " + amt);
    }

    function updateUI() { document.getElementById('accountBalance').textContent = balance; }
  </script>
</body>
</html>
