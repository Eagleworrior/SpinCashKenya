<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin Cash Kenya - VIP Edition</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    /* DECORATION & COLOR PALETTE */
    :root {
      --money-green: #00fc7b; --gold: #FFD700; --hot-pink: #ff007f;
      --cyan: #00ffff; --purple: #8a2be2; --dark-bg: #0a0a0a;
    }

    body {
      font-family: 'Arial Black', Impact, sans-serif;
      background: radial-gradient(circle at center, #1a0033 0%, #000000 100%);
      color: #fff; text-align: center; margin: 0; padding: 10px;
    }

    .hidden { display: none !important; }

    /* LAYOUT COMPONENTS */
    .app-container { max-width: 600px; margin: 0 auto; }
    .panel {
      background: rgba(20,20,20,0.95); padding: 20px; border-radius: 20px;
      border: 3px solid var(--gold); margin: 15px 0; box-shadow: 0 0 20px rgba(255,215,0,0.2);
    }

    /* INPUTS & BUTTONS */
    input { 
      width: 100%; padding: 15px; margin: 10px 0; box-sizing: border-box;
      background: #000; border: 2px solid var(--cyan); border-radius: 10px; color: var(--cyan);
    }
    .btn { 
      width: 100%; padding: 15px; border-radius: 50px; border: none; 
      font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 5px 0;
    }

    /* GAMES */
    .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 20px 0; }
    .slot-cell { padding: 15px; background: #222; border: 1px solid #444; border-radius: 5px; font-size: 1.5em; }
    #wheelCanvas { width: 250px; height: 250px; border-radius: 50%; border: 5px solid var(--purple); }

    /* MODE TOGGLE */
    .toggle-container { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
    .active-mode { border: 2px solid var(--money-green) !important; color: var(--money-green) !important; }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="authPanel" class="panel">
      <h1 style="color:var(--cyan);">SPIN CASH KE</h1>
      <input type="text" id="regName" placeholder="Full Name">
      <input type="text" id="regPhone" placeholder="07XX XXX XXX">
      <button class="btn" style="background:var(--purple); color:#fff;" onclick="login()">ENTER CASINO</button>
    </div>

    <div id="appPanel" class="hidden">
      <div class="panel" style="text-align: center;">
        <h2 style="color:var(--gold);">BALANCE: KSh <span id="balDisplay">500</span></h2>
        <div class="toggle-container">
          <button id="btnDemo" class="btn active-mode" onclick="setMode('demo')">DEMO</button>
          <button id="btnReal" class="btn" onclick="setMode('real')">REAL</button>
        </div>
      </div>

      <div style="display:flex; gap:5px;">
        <button class="btn" style="background:var(--purple);" onclick="switchView('games')">GAMES</button>
        <button class="btn" style="background:var(--hot-pink);" onclick="switchView('wallet')">WALLET</button>
        <button class="btn" style="background:var(--cyan);" onclick="switchView('profile')">PROFILE</button>
      </div>

      <div id="viewGames">
        <div class="panel">
          <h2 style="color:var(--purple);">SPIN WHEEL</h2>
          <canvas id="wheelCanvas"></canvas>
          <button class="btn" style="background:var(--purple);" onclick="spinWheel()">SPIN (20 KSh)</button>
        </div>
        <div class="panel">
          <h2 style="color:var(--hot-pink);">CASINO SLOTS</h2>
          <div id="slotGrid" class="slot-grid"></div>
          <button class="btn" style="background:var(--hot-pink);" onclick="spinSlots()">PULL LEVER (20 KSh)</button>
        </div>
      </div>

      <div id="viewWallet" class="panel hidden">
        <h2 style="color:var(--money-green);">DEPOSIT & WITHDRAW</h2>
        <input type="number" id="depAmount" placeholder="Deposit Amount (Min 50)">
        <button class="btn" style="background:var(--money-green);" onclick="payWithPaystack()">DEPOSIT</button>
        <input type="number" id="withAmount" placeholder="Withdrawal Amount">
        <button class="btn" style="background:var(--gold);" onclick="withdraw()">WITHDRAW</button>
      </div>

      <div id="viewProfile" class="panel hidden">
        <h2 style="color:var(--cyan);">PROFILE</h2>
        <p>Name: <span id="proName">Player</span></p>
        <p>Ref: <a href="https://eagleworrior.github.io/SpinCashKenya/" target="_blank">View Link</a></p>
        <input type="file" id="kycDoc">
        <button class="btn" style="background:#555;" onclick="alert('Upload Complete')">VERIFY ID</button>
        <button class="btn" style="background:#000; border:1px solid red;" onclick="location.reload()">LOGOUT</button>
      </div>
    </div>
  </div>

  <script>
    // --- CONFIG ---
    const PUBLIC_KEY = 'pk_live_27d2699bf73e5b924f911ce6d2ba876a7657d1bd';
    let state = { mode: 'demo', demoBal: 500, realBal: 0 };

    // --- INIT ---
    function initSlots() {
      const grid = document.getElementById('slotGrid');
      for(let i=0; i<20; i++) {
        let div = document.createElement('div');
        div.className = 'slot-cell';
        div.textContent = ["🍒","💎","7️⃣","🍋","🍇"][Math.floor(Math.random()*5)];
        grid.appendChild(div);
      }
    }
    initSlots();

    // --- NAVIGATION ---
    function login() {
      document.getElementById('proName').textContent = document.getElementById('regName').value || "Player";
      document.getElementById('authPanel').classList.add('hidden');
      document.getElementById('appPanel').classList.remove('hidden');
    }

    function switchView(v) {
      document.getElementById('viewGames').classList.toggle('hidden', v !== 'games');
      document.getElementById('viewWallet').classList.toggle('hidden', v !== 'wallet');
      document.getElementById('viewProfile').classList.toggle('hidden', v !== 'profile');
    }

    function setMode(m) {
      state.mode = m;
      document.getElementById('btnDemo').className = m === 'demo' ? 'btn active-mode' : 'btn';
      document.getElementById('btnReal').className = m === 'real' ? 'btn active-mode' : 'btn';
      if(m === 'real' && state.realBal === 0) payWithPaystack();
      updateBal();
    }

    function updateBal() {
      document.getElementById('balDisplay').textContent = state.mode === 'demo' ? state.demoBal : state.realBal;
    }

    // --- GAMES ---
    function spinWheel() {
      let cost = 20;
      if(state.mode === 'demo' ? state.demoBal < cost : state.realBal < cost) return alert("Low balance!");
      if(state.mode === 'demo') state.demoBal -= cost; else state.realBal -= cost;
      updateBal();
      alert("Wheel Spinning...");
    }

    function spinSlots() {
      let cost = 20;
      if(state.mode === 'demo' ? state.demoBal < cost : state.realBal < cost) return alert("Low balance!");
      if(state.mode === 'demo') state.demoBal -= cost; else state.realBal -= cost;
      
      const cells = document.querySelectorAll('.slot-cell');
      cells.forEach(c => c.textContent = ["🍒","💎","7️⃣","🍋","🍇"][Math.floor(Math.random()*5)]);
      
      if(Math.random() > 0.8) {
        let win = 100;
        if(state.mode === 'demo') state.demoBal += win; else state.realBal += win;
        alert("WIN! +100 KSh");
      }
      updateBal();
    }

    // --- PAYSTACK ---
    function payWithPaystack() {
      let amt = parseInt(document.getElementById('depAmount').value) || 50;
      let handler = PaystackPop.setup({
        key: PUBLIC_KEY,
        email: 'user@test.com',
        amount: amt * 100,
        currency: 'KES',
        callback: (res) => {
          state.realBal += amt;
          state.mode = 'real';
          updateBal();
          alert("Success! Trans: " + res.reference);
        }
      });
      handler.openIframe();
    }

    function withdraw() {
      let amt = parseInt(document.getElementById('withAmount').value);
      if(state.realBal < amt) return alert("Insufficient Real Funds!");
      state.realBal -= amt;
      updateBal();
      alert("Withdrawal requested for KSh " + amt);
    }
  </script>
</body>
</html>
